#  Configuration file for HyDE Dotfiles Manager - Deez Dots
# This will also serve as an example for the configuration file

[global] #  This is used to define global variables use for default fallbacks
version = "0.1.0"                                # Version of the configuration file // Follows Semantic Versioning
owner = "The HyDE Project"                       # Owner of the configuration file
action= "preserve"                       # Actions can either be sync or preserve
git = "https://github.com/HyDE-Project/HyDE.git"
git_branch = "dev"
dots =[
    "kitty","hyprland",
] # List of dots to be used in the configuration file
pre_command = "echo 'starting deployment'"
post_command = "notify-send 'deez done'"

# Loads an array of package manager commands
# This helps support custom package managers
# and custom custom flags for each manager
[[global.package_managers]]
name = "yay"
query = "yay -Qs"
install = "yay -S"
uninstall = "yay -R"
update = "yay -Syu"

[[global.package_managers]]
name = "paru"
query = "paru -Qs"
install = "paru -S"
uninstall = "paru -R"
update = "paru -Syu"

[[global.package_managers]]
name = "dnf"
query = "dnf list installed"
install = "sudo dnf install"
uninstall = "sudo dnf remove"
update = "sudo dnf upgrade --refresh"

[[global.package_managers]]
name = "apt"
query = "apt list --installed"
install = "sudo apt install -y"
uninstall = "sudo apt remove -y"
update = "sudo apt update && sudo apt upgrade -y"

[[global.package_managers]]
name = "flatpak"
query = "flatpak list --app --columns application | grep "
install = "flatpak install -y"
uninstall = "flatpak uninstall -y"  # TODO: add --unused
update = "flatpak update -y"    


[hyde]
pre_command = "echo 'Pre commands '"
post_command = "echo 'HyDE backed up!'"
[[hyde.dependency]]
pacman = ["hyprland", "nwg-look", "qt5ct", "qt6ct"]
dnf = ["another-dependency"]

[[hyde.files]]
action = "preserve"
source_root = "hyde/.config/hypr"
target_root = "${XDG_CONFIG_HOME}/hypr"
paths = "nvidia.conf"

[[hyde.files.dependency]]
pacman = ["nvidia-utils"]
dnf = ["another-dependency"]


#? Core configuration
[[hyde.files]]
source_root = "hyde/.config"
target_root = "$XDG_CONFIG_HOME"
paths = [
    "hyde/wallbash",
    "hypr/hyprland.conf",
    "hypr/windowrules.conf",
    "hypr/keybindings.conf",
    "hypr/monitors.conf",
    "hypr/animations.conf",
    "hypr/themes",
]


[[hyde.files]]
clean_target = true
action = "sync"
source_root = "hyde/.local/lib"
target_root = "${HOME}/.local/lib"
paths = "hyde"


[[hyde.files]]
action = "sync"
source_root = "hyde/.local/share"
target_root = "${XDG_DATA_HOME}"
paths = ["icons/Wallbash-Icon", "themes/Wallbash-Gtk"]

[[hyde.files]]
clean_target = true
action = "sync"
source_root = "hyde/.local/share"
target_root = "${XDG_DATA_HOME}"
paths = "hyde"

[[hyde.files]]
source_root = "hyde/.config"
target_root = "${XDG_CONFIG_HOME}"
paths = ["gtk-3.0", "Kvantum", "nwg-look", "qt5ct", "qt6ct", "xsettingsd"]

[[hyde.files]]
source_root = "hyde"
target_root = "${HOME}"
paths = ".gtkrc-2.0"


[waybar]
pre_command = "echo 'Pre commands '"
post_command = "echo 'HyDE backed up!'"

[[waybar.files]]
target_root = "${XDG_CONFIG_HOME}/waybar"
paths = ["config.ctl", "modules", "config.jsonc", "theme.css", "style.css"]


[dolphin]
version = "0.1.0"
owner = "The HyDE Project"
action = "sync"
home = "${HOME}"
pre_command = "echo 'Pre commands '"    # Pre commands
post_command = "echo 'HyDE backed up!'" # Post commands
distribution = "arch"              # Distribution

[[dolphin.files]]
target_root = "${HOME}"
paths = [
    ".config/dolphinrc",
    ".config/kdeglobals",
    ".config/menus/applications.menu",
    ".local/share/dolphin",
    ".local/share/kio/servicemenus/hydewallpaper.desktop",
    ".local/share/kxmlgui5/dolphin",
]

[[dolphin.files]]
target_root = "${XDG_CONFIG_HOME}"
paths = "baloofilerc"

[dunst]
pre_command = "echo 'Pre commands '"    # Pre commands
post_command = "echo 'HyDE backed up!'" # Post commands

[[dunst.files]]
target_root = "${XDG_CONFIG_HOME}"
paths = "dunst"

[[dunst.files]]
clean_target = true
action = "sync"
source_root = "hyde/wallbash.dunst.sh"
target_root = "${HOME}/.local/lib"
paths = "hyde/wallbash.dunst.sh"

[kitty]
pre_command = "echo 'Pre commands '"    # Pre commands
post_command = "echo 'HyDE backed up!'" # Post commands

[[kitty.dependency]]
yay = ["kitty"] # Dependency for kitty

[[kitty.files]]
action = "sync"
source_root = "Configs/.config/"
target_root = "${XDG_CONFIG_HOME}"
paths = ["kitty/hyde.conf", "kitty/kitty.conf"]

[[kitty.files]]
action = "preserve"
source_root = "Configs/.config/"
target_root = "${XDG_CONFIG_HOME}"
paths = "kitty/theme.conf"

[[kitty.files.dependency]]
yay = ["imagemagick", "hyprland"]




[[hyprland.dependency]]
yay = ["hyprland-git"]
paru = ["hyprland-git"]
dnf = ["hyprland"]

[hyprland]
pre_command = "echo 'Pre commands '"
post_command = "echo 'HyDE backed up!'"



[[hyprland.files]]
action = "preserve"
source_root = "Configs/.config/hypr"
target_root = "${XDG_CONFIG_HOME}/hypr"
paths = [
    "hyprland.lua",
]

[[hyprland.files]]
action = "sync"
source_root = "Configs/.local/share/hypr"
target_root = "${XDG_DATA_HOME}/hypr"
paths = "." # sync all files in the source directory
ignored_paths = [
    "*.vscode",
    "*.conf"
]

[[hyprland.files]]
action = "[preserve]"
source_root = "Configs/.local/state/hyde/lua_state"
target_root = "${XDG_STATE_HOME}/hyde/lua_state"
paths = "*.lua"
